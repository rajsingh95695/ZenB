version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend

  admin-dashboard:
    build:
      context: ./admin-dashboard
    ports:
      - '3001:3001'

  seller-dashboard:
    build:
      context: ./seller-dashboard
    ports:
      - '3002:3002'

volumes:
  mongo_data:
